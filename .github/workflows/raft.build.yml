name: raft Image CI
permissions: {}

on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/raft.build.yml"
      - "raft.build/**"
  schedule:
    - cron: "12 12 * * *"
  workflow_dispatch:

env:
  raft_daemon_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/raft-daemon

jobs:
  raft-daemon:
    outputs:
      ver_raft_daemon: ${{ steps.chores.outputs.ver_raft_daemon }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Chores (generate envs)
        id: chores
        run: |
          set -e -o pipefail

          if [[ ! -s raft.build/.codex_version ]]; then
              echo "ERROR: .codex_version file not found or is empty"
              exit 1
          fi
          if [[ ! -s raft.build/.raft_daemon_version ]]; then
              echo "ERROR: .raft_daemon_version file not found or is empty"
              exit 1
          fi

          ver_codex="$(tr -d '\r\n\t\f\v ' < raft.build/.codex_version)"
          ver_raft_daemon="$(tr -d '\r\n\t\f\v ' < raft.build/.raft_daemon_version)"
          echo "ver_codex=${ver_codex}" >> "$GITHUB_OUTPUT"
          echo "ver_raft_daemon=${ver_raft_daemon}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            ver_codex=${{ steps.chores.outputs.ver_codex }}
            ver_raft_daemon=${{ steps.chores.outputs.ver_raft_daemon }}
          context: "{{defaultContext}}:raft.build"
          file: raft-daemon.Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,compression=estargz,force-compression=true,oci-mediatypes=true,name=${{ env.raft_daemon_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        env:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}
        run: |
          mkdir -p /tmp/raft-daemon-digests/
          touch "/tmp/raft-daemon-digests/${digest#sha256:}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: raft-daemon-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/raft-daemon-digests/*
          if-no-files-found: error
          retention-days: 1

  raft-daemon-multiarch:
    runs-on: ubuntu-24.04
    needs:
      - raft-daemon
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/raft-daemon-digests/
          pattern: raft-daemon-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/raft-daemon-digests/
        env:
          REGISTRY_IMAGE: ${{ env.raft_daemon_IMAGE }}
          ver_raft_daemon: ${{ needs.raft-daemon.outputs.ver_raft_daemon }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create --tag "${REGISTRY_IMAGE}:${ver_raft_daemon}" \
              $(printf "${REGISTRY_IMAGE}@sha256:%s " *)
      - name: Inspect image
        env:
          REGISTRY_IMAGE: ${{ env.raft_daemon_IMAGE }}
          ver_raft_daemon: ${{ needs.raft-daemon.outputs.ver_raft_daemon }}
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${ver_raft_daemon}" \
              | grep -Po '[^ \r\n\t\v]+@sha256:[a-z0-9]+' | xargs -r -t -n 1 docker buildx imagetools inspect --raw
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.raft_daemon_IMAGE }}:${{ needs.raft-daemon.outputs.ver_raft_daemon }}"
          format: "table"
